name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Sync files to VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='backend/.env' \
            --exclude='frontend/.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/gest_stock

      - name: Build and start apps
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'

            set -e

            echo "📦 Backend install..."
            cd /var/www/gest_stock/backend
            npm install
            npm run build

            echo "🚀 Backend start..."
            pm2 delete backend || true
            pm2 start dist/index.js --name backend


            echo "📦 Frontend install..."
            cd /var/www/gest_stock/frontend
            npm install
            npm run build

            echo "🚀 Frontend start..."
            pm2 delete frontend || true
            pm2 start npm --name frontend -- start


            echo "💾 Save PM2..."
            pm2 save

            echo "🔄 Restart Nginx..."
            sudo systemctl restart nginx

            echo "✅ Deploy finished"

          ENDSSH