name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy files to VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='backend/dist' \
            --exclude='.env' \
            --exclude='backend/.env' \
            --exclude='frontend/.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/gest_stock

      - name: Run post-deployment commands
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" "
            set -e &&
            cd /var/www/gest_stock &&
            echo '📦 Installation complète (avec devDependencies pour le build)...' &&
            npm install &&
            echo '🏗️ Build du backend (TypeScript)...' &&
            npm run build --workspace=backend &&
            echo '🏗️ Build du frontend...' &&
            npm run build --workspace=frontend &&
            echo '🧹 Suppression des devDependencies...' &&
            npm prune --omit=dev &&
            echo '🔄 Redémarrage PM2...' &&
            (pm2 describe gest_backend > /dev/null 2>&1 && pm2 restart gest_backend || pm2 start backend/dist/index.js --name gest_backend) &&
            pm2 save &&
            echo '✅ Déploiement terminé'
          "