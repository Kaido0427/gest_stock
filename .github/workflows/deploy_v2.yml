name: Deploy GestStock v2 → VPS

on:
  push:
    branches: [store-v2]
  workflow_dispatch:

concurrency:
  group: deploy-gest-stock-v2
  cancel-in-progress: false

env:
  REMOTE_HOST: 187.124.34.35
  REMOTE_USER: cga

jobs:
  # ─── Backend Hono/TypeScript ─────────────────────────────────────────────────
  deploy-backend:
    name: Backend → store-api.cmidigit.com
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: store-v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack + install all deps + build + prune to prod
        run: |
          corepack enable
          yarn install --frozen-lockfile
          yarn build
          # yarn workspaces hoist deps to root — npm creates a local node_modules for deploy
          npm install --omit=dev --no-package-lock

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 -H "$REMOTE_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync to VPS (dist + node_modules prod + .env.example)
        # .env exclu : géré manuellement sur le VPS
        run: |
          rsync -az --delete \
            --exclude '.env' \
            --exclude 'src' \
            --exclude 'tmp' \
            --exclude '*.md' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            ./ "$REMOTE_USER@$REMOTE_HOST:/var/www/gest_stock_backend/"

      - name: Seed .env + restart PM2
        run: |
          ssh -i ~/.ssh/deploy_key "$REMOTE_USER@$REMOTE_HOST" bash -s <<'EOF'
            set -e
            cd /var/www/gest_stock_backend
            if [ ! -s .env ] && [ -f .env.example ]; then
              cp .env.example .env
              echo "[deploy] .env initialisé depuis .env.example — édite-le sur le VPS"
            fi
            if pm2 describe gest-stock-api >/dev/null 2>&1; then
              pm2 reload gest-stock-api --update-env
            else
              pm2 start dist/index.js --name gest-stock-api --time
            fi
            pm2 save
          EOF

  # ─── Frontend React/Vite ────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → digitboutique.cmidigit.com
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: store-v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack + install deps + build
        env:
          VITE_API_URL: https://store-api.cmidigit.com
        run: |
          corepack enable
          yarn install --frozen-lockfile
          yarn build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 -H "$REMOTE_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync dist/ to VPS
        run: |
          ssh -i ~/.ssh/deploy_key "$REMOTE_USER@$REMOTE_HOST" "mkdir -p /var/www/gest_stock_frontend/dist"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            dist/ "$REMOTE_USER@$REMOTE_HOST:/var/www/gest_stock_frontend/dist/"
