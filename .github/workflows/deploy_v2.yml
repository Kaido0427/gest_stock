name: 🚀 Deploy GestStock v2 → LWS cPanel

on:
    push:
        branches:
            - store-v2

jobs:
    # ─────────────────────────────────────────────
    # JOB 1 — Frontend React → digitboutique.cmidigit.com
    # ─────────────────────────────────────────────
    deploy-frontend:
        name: 🎨 Frontend → digitboutique.cmidigit.com
        runs-on: ubuntu-latest

        steps:
            - name: 📥 Checkout
              uses: actions/checkout@v4
              with:
                  ref: store-v2

            - name: ⚙️ Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "yarn"
                  cache-dependency-path: yarn.lock

            - name: 📦 Install dependencies
              working-directory: frontend
              run: yarn install --frozen-lockfile

            - name: 🔨 Build
              working-directory: frontend
              env:
                  VITE_API_URL: ${{ secrets.VITE_API_URL_V2 }}
              run: yarn build

            - name: 📤 Deploy via FTP
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ secrets.FTP_HOST_V2 }}
                  username: ${{ secrets.FTP_USER_V2 }}
                  password: ${{ secrets.FTP_PASSWORD_V2 }}
                  local-dir: frontend/dist/
                  server-dir: /public_html/digitboutique/
                  protocol: ftps

    # ─────────────────────────────────────────────
    # JOB 2 — Backend Hono → store-api.cmidigit.com
    # ─────────────────────────────────────────────
    deploy-backend:
        name: 🚀 Backend → store-api.cmidigit.com
        runs-on: ubuntu-latest

        steps:
            - name: 📥 Checkout
              uses: actions/checkout@v4
              with:
                  ref: store-v2

            - name: ⚙️ Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "yarn"
                  cache-dependency-path: yarn.lock

            - name: 📦 Install dependencies
              working-directory: backend
              run: yarn install --frozen-lockfile

            - name: 🔨 Build TypeScript
              working-directory: backend
              run: yarn build

            - name: 📤 Deploy dist/ via FTP
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ secrets.FTP_HOST_V2 }}
                  username: ${{ secrets.FTP_USER_V2 }}
                  password: ${{ secrets.FTP_PASSWORD_V2 }}
                  local-dir: backend/dist/
                  server-dir: /store-api/dist/
                  protocol: ftps

            - name: 📤 Deploy package.json via FTP
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ secrets.FTP_HOST_V2 }}
                  username: ${{ secrets.FTP_USER_V2 }}
                  password: ${{ secrets.FTP_PASSWORD_V2 }}
                  local-dir: backend/
                  server-dir: /store-api/
                  protocol: ftps
                  exclude: |
                      **/.git*
                      **/node_modules/**
                      **/src/**
                      **/.env
                      **/dist/**

            - name: 🔄 Restart app (Passenger)
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ secrets.FTP_HOST_V2 }}
                  username: ${{ secrets.FTP_USER_V2 }}
                  password: ${{ secrets.FTP_PASSWORD_V2 }}
                  local-dir: backend/tmp/
                  server-dir: /store-api/tmp/
                  protocol: ftps
